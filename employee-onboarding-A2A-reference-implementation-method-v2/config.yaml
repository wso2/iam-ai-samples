# A2A Reference Implementation Configuration

# ─────────────────────────────────────────────────────────────────
# Asgardeo Configuration
# ─────────────────────────────────────────────────────────────────
asgardeo:
  organization: "${ASGARDEO_ORG_NAME}"
  
  # Orchestrator Application (ONLY App in the system)
  # All agents are linked to this single Application
  orchestrator:
    application:
      client_id: "${ORCHESTRATOR_CLIENT_ID}"
      client_secret: "${ORCHESTRATOR_CLIENT_SECRET}"
    agent:
      agent_id: "${ORCHESTRATOR_AGENT_ID}"
      agent_secret: "${ORCHESTRATOR_AGENT_SECRET}"

# ─────────────────────────────────────────────────────────────────
# A2A Agents (Worker Agents)
# ─────────────────────────────────────────────────────────────────
# Method V2: Each agent has its own WSO2 IS Application (client_id/secret).
# The Orchestrator downscopes the user token using its own credentials and
# forwards the pre-scoped token to each agent. Each agent then performs a
# second exchange using its own app credentials when calling its downstream API.
# No shared Token Exchanger app; no actor token required for exchange.
agents:
  hr_agent:
    name: "HR Agent"
    description: "Manages employee profiles"
    url: "http://localhost:8001"
    # hr:write — create_employee, grant_privileges (POST endpoints)
    # hr:read  — get_employee, list_employees (GET endpoints, LLM may verify after create)
    required_scopes: ["hr:write", "hr:read"]
    target_audience: "onboarding-api"
    client_id: "${HR_CLIENT_ID}"
    client_secret: "${HR_CLIENT_SECRET}"
    agent_id: "${HR_AGENT_ID}"
    agent_secret: "${HR_AGENT_SECRET}"
    skills:
      - id: "create_employee"
        name: "Create Employee"

  it_agent:
    name: "IT Agent"
    description: "Provisions IT accounts"
    url: "http://localhost:8002"
    # it:write — provision VPN, GitHub, AWS (POST endpoints via MCP)
    # it:read  — list provisions (GET endpoint via MCP)
    required_scopes: ["it:write", "it:read"]
    target_audience: "onboarding-api"
    client_id: "${IT_CLIENT_ID}"
    client_secret: "${IT_CLIENT_SECRET}"
    agent_id: "${IT_AGENT_ID}"
    agent_secret: "${IT_AGENT_SECRET}"
    # IT Agent routes through MCP Server instead of calling API directly
    # MCP Server reuses IT Agent's credentials for token exchange (not a separate identity)
    mcp_server:
      url: "http://localhost:8020"
    skills:
      - id: "provision_vpn"
        name: "Provision VPN"

  payroll_agent:
    name: "Finance & Payroll Agent"
    description: "Registers employees in payroll and sets up expense accounts"
    url: "http://localhost:8004"
    # payroll:write only — onboarding creates payroll records and expense accounts (POST endpoints)
    # payroll:read not forwarded — agent does not need to read back after writing
    required_scopes: ["payroll:write"]
    target_audience: "onboarding-api"
    client_id: "${PAYROLL_CLIENT_ID}"
    client_secret: "${PAYROLL_CLIENT_SECRET}"
    agent_id: "${PAYROLL_AGENT_ID}"
    agent_secret: "${PAYROLL_AGENT_SECRET}"
    skills:
      - id: "register_payroll"
        name: "Register Payroll"
      - id: "setup_expense"
        name: "Setup Expense Account"

  booking_agent:
    name: "Booking Agent"
    description: "Schedules tasks and deliveries"
    url: "http://localhost:8005"
    # booking:write only — onboarding creates tasks and deliveries (POST endpoints)
    # booking:read not forwarded — agent does not need to list after scheduling
    required_scopes: ["booking:write"]
    target_audience: "onboarding-api"
    client_id: "${BOOKING_CLIENT_ID}"
    client_secret: "${BOOKING_CLIENT_SECRET}"
    agent_id: "${BOOKING_AGENT_ID}"
    agent_secret: "${BOOKING_AGENT_SECRET}"
    skills:
      - id: "create_task"
        name: "Create Task"




# ─────────────────────────────────────────────────────────────────
# Orchestrator Settings
# ─────────────────────────────────────────────────────────────────
orchestrator:
  name: "Onboarding Orchestrator"
  description: "AI-powered employee onboarding coordinator"
  url: "http://localhost:8000"
  port: 8000
  
  discovery:
    agent_urls:
      - "http://localhost:8001"   # HR Agent
      - "http://localhost:8002"   # IT Agent
      - "http://localhost:8004"   # Finance & Payroll Agent
      - "http://localhost:8005"   # Booking Agent
  
  llm:
    provider: "openai"
    model: "gpt-4o"
    temperature: 0
